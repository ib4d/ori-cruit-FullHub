version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hubdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  hub-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/hubdb?schema=public"
      JWT_SECRET: "supersecret"
      PORT: 3001
    ports:
      - "3001:3001"

  hub-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - hub-api
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://hub-api:3001"
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres-data:
