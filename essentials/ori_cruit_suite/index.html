<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORI-CRUIT Suite Launcher</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0e0f17;color:#f6f7fb;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0}
    .card{width:min(100%,520px);padding:2rem;background:radial-gradient(circle at top,#1f1f45,#0d0f1b);border:1px solid #2d2f44;border-radius:8px;box-shadow:0 20px 80px rgba(0,0,0,.45)}
    h1{margin:0 0 1rem;font-size:22px;text-transform:uppercase;letter-spacing:.12em;color:#f593bf}
    p{margin:.35rem 0 1rem;color:#c7cbf0}
    .links{display:grid;gap:.55rem}
    a{display:block;text-decoration:none;padding:.72rem 1rem;background:#1f2142;border:1px solid #4b4f7a;color:#fff;font-weight:700;border-radius:4px;text-align:center;transition:.2s}
    a:hover{background:#ee2bad;color:#fff;cursor:pointer}
    .note{margin-top:1rem;font-size:.79rem;color:#99a1c7;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <h1>ORI-CRUIT Suite</h1>
    <p>Choose a screen. Theme + language persisted. For local usage and deployment.</p>
    <div class="links">
      <a href="dashboard.html">Dashboard</a>
      <a href="home.html">Home</a>
      <a href="pipeline.html">Pipeline</a>
      <a href="workspace.html">Workspace</a>
    </div>
    <p class="note">Use this as root entry for hosted site and local package.</p>
  </div>
</body>
</html>
